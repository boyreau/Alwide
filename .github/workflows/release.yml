name: Release Alwide

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libncursesw5-dev clang-18
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang-18 100

      - name: Install tree-sitter CLI
        run: |
          for i in {1..3}; do
            npm install -g tree-sitter-cli && exit 0 || sleep 10
          done
          exit 1

      - name: Build tree-sitter library
        run: sudo make -C lib/tree-sitter/ install

      - name: Build Alwide (Release)
        run: make release -j$(nproc)

      - name: Install AppImage dependencies
        run: |
          sudo apt-get install -y libfuse2
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/share/alwide
          cp -r assets/* AppDir/usr/share/alwide/
          ./linuxdeploy-x86_64.AppImage --appdir AppDir -e al -i alwide.png -d alwide.desktop --output appimage
          mv Alwide-x86_64.AppImage alwide-x86_64.AppImage

      - name: Install FPM
        run: |
          sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install --no-document fpm

      - name: Build .deb and .rpm packages
        run: |
          mkdir -p build_root
          make DESTDIR=./build_root PREFIX=/usr install
          fpm -s dir -t deb -n alwide -v $(echo ${{ github.ref_name }} | sed 's/v//') -C build_root usr/bin usr/share
          fpm -s dir -t rpm -n alwide -v $(echo ${{ github.ref_name }} | sed 's/v//') -C build_root usr/bin usr/share

      - name: Prepare Assets
        run: |
          mkdir -p dist
          cp al dist/
          zip -r alwide-assets.zip assets/
          tar -czvf alwide-linux-x86_64.tar.gz -C dist al

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            alwide-linux-x86_64.tar.gz
            alwide-assets.zip
            alwide-x86_64.AppImage
            alwide*.deb
            alwide*.rpm
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
